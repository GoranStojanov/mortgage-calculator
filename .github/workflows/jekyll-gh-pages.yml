name: (disabled) Deploy Jekyll with GitHub Pages

on:
  # Keep only manual runs; avoid interfering with Vite / PWA deployment.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: ${{ false }} # disabled; use deploy.yml instead
    runs-on: ubuntu-latest
    steps:
      - run: echo "Jekyll Pages workflow disabled; use deploy.yml for Vite build."
